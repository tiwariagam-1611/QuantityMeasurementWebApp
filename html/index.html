<!-- 
UC-JS-14: Render History List
Goal: Display calculation history records in the history panel.
Actor: End User (via ui.js)
Trigger: loadHistory() returns data OR a new record is saved.
Steps Learned:
  - Selected history container using querySelector().
  - Cleared existing list using innerHTML.
  - Handled empty or undefined records safely.
  - Created list items dynamically using createElement().
  - Formatted timestamp using toLocaleString().
  - Appended each record to the list.
Outcome: History panel shows all past calculations in a readable format.

@author Developer
@version 14.0
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="p-0">

        <!-- HEADER -->
        <div class="header text-center text-white py-4">
            <h1>Quantity Measurement</h1>
        </div>

        <div class="m-5">

            <!-- ================= TYPE ================= -->
            <p class="section-title">CHOOSE TYPE</p>

            <div class="row g-4" id="type-selector">

                <div class="col-md-3">
                    <div class="type-card active text-center" data-type="Length">
                        <p>Length</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center" data-type="Weight">
                        <p>Weight</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center" data-type="Temperature">
                        <p>Temperature</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center" data-type="Volume">
                        <p>Volume</p>
                    </div>
                </div>

            </div>


            <!-- ================= ACTION ================= -->
            <p class="section-title mt-5">CHOOSE ACTION</p>

            <div class="row g-3" id="action-selector">

                <div class="col-md-4">
                    <button class="btn action-btn active w-100" data-action="Comparison">
                        Comparison
                    </button>
                </div>

                <div class="col-md-4">
                    <button class="btn action-btn w-100" data-action="Conversion">
                        Conversion
                    </button>
                </div>

                <div class="col-md-4">
                    <button class="btn action-btn w-100" data-action="Arithmetic">
                        Arithmetic
                    </button>
                </div>

            </div>


            <!-- ================= INPUT SECTION ================= -->
            <div class="mb-4 row mt-5 g-4">

                <!-- FROM -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">FROM</label>

                    <div class="input-box">
                        <input type="number" id="from-value" class="form-control mb-3" placeholder="Enter value">

                        <select id="from-unit" class="form-select"></select>
                    </div>
                </div>

                <!-- TO -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">TO</label>

                    <div class="input-box">
                        <input type="number" id="to-value" class="form-control mb-3" placeholder="Enter value">

                        <select id="to-unit" class="form-select"></select>
                    </div>
                </div>

            </div>


            <!-- ================= OPERATOR (UC-13) ================= -->
            <div class="mt-4" id="operator-selector" style="display: none;">
                <div class="d-flex justify-content-center gap-3">

                    <button class="btn btn-secondary operator-btn" data-op="+">+</button>
                    <button class="btn btn-secondary operator-btn" data-op="-">-</button>
                    <button class="btn btn-secondary operator-btn" data-op="*">*</button>
                    <button class="btn btn-secondary operator-btn" data-op="/">/</button>

                </div>
            </div>


            <!-- ================= RESULT (UC-12) ================= -->
            <div class="mt-5 text-center">
                <p class="section-title">RESULT</p>

                <div class="input-box">
                    <h2>
                        <span id="result-value">—</span>
                        <span id="result-unit"></span>
                    </h2>
                </div>
            </div>

            <!-- HISTORY PANEL -->
            <div class="mt-5">
                <p class="section-title">HISTORY</p>

                <ul id="history-list" class="list-group">
                    <li class="list-group-item">No history yet.</li>
                </ul>
            </div>

        </div>
    </div>


    <!-- ================= JS FILES ================= -->
    <script src="https://example.com/fontawesome/v7.0.1/js/fontawesome.js" data-auto-replace-svg="nest"></script>
    <script src="https://example.com/fontawesome/v7.0.1/js/solid.js"></script>
    <script src="https://example.com/fontawesome/v7.0.1/js/brands.js"></script>
    <script src="../js/conversion.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>

</body>
</html>
