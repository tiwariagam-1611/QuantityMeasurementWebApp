<!-- 
UC-JS-02: App Initialisation
Goal: Initialise the application on page load by wiring up event listeners 
      and loading default data.
Actor: End User
Trigger: DOMContentLoaded event fires.
Steps Learned:
  - Wrapped all code inside DOMContentLoaded to ensure DOM readiness.
  - Declared a shared "state" object to track current selections.
  - Called attachEventListeners() to prepare UI interactions.
  - Called loadUnits("Length") to pre-fill FROM and TO dropdowns.
  - Set first type-card and first action-button as active.
  - Hid operator row initially with toggleOperators(false).
  - Loaded history records with loadHistory().
Outcome: Application starts in a consistent state, ready for conversions, 
         comparisons, or arithmetic operations.

@author Developer
@version 2.0
-->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    
</head>
<body>

    <div class="p-0">

        <!-- HEADER -->
        
        <div class="header text-center text-white py-4"onclick="changeBg()">
            <h1 id="h1j">Welcome To Quantity Measurement</h1>
        </div>
        <div class="m-5">
            <p class="section-title">CHOOSE TYPE</p>

            <div class="row g-4">

                <div class="col-md-3">
                    <div class="type-card active text-center">
                        <div class="icon"><i class="fa-solid fa-ruler" style="color: rgb(28, 149, 72);"></i></div>
                        <p>Length</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <div class="icon"><i class="fa-solid fa-weight-scale" style="color: rgb(28, 149, 72);"></i></i></div>

                        <p>Weight</p>
                        
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <div class="icon"> <i class="fa-solid fa-temperature-arrow-down" style="color: rgb(28, 149, 72);"></i></div>
                        <p>Temperature</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <div class="icon"><i class="fa-solid fa-bottle-water" style="color: rgb(28, 149, 72);"></i></div>
                        <p>Volume</p>
                    </div>
                </div>

                

            </div>

            <p class="section-title mt-5">CHOOSE ACTION</p>

            <div class="row g-3">

                <div class="col-md-4">
                    <button class="btn action-btn active w-100">Comparison</button>
                </div>

                <div class="col-md-4">
                    <button class="btn action-btn w-100">Conversion</button>
                </div>

                <div class="col-md-4">
                    <button class="btn action-btn w-100">Arithmetic</button>
                </div>

            </div>


            <!-- INPUT SECTION -->

            <div class="mb-4 row mt-5 g-4">

                <!-- FROM -->

                <div class="col-md-6">
                    <label class="form-label fw-bold">FROM</label>

                    <div class="input-box">
                        <h1>1</h1>

                        <select class="form-select">
                            <option>Kilometer</option>
                            <option>Meter</option>
                            <option>Centimeter</option>
                        </select>
                    </div>
                </div>


                <!-- TO -->

                <div class="col-md-6">
                    <label class="form-label fw-bold">TO</label>

                    <div class="input-box">
                        <h1>1000</h1>

                        <select class="form-select">
                            <option>Meters</option>
                            <option>Kilometers</option>
                            <option>Centimeters</option>
                        </select>
                    </div>
                </div>

            </div>

        </div>

    </div>
    <script src="https://example.com/fontawesome/v7.0.1/js/fontawesome.js" data-auto-replace-svg="nest"></script>
    <script src="https://example.com/fontawesome/v7.0.1/js/solid.js"></script>
    <script src="https://example.com/fontawesome/v7.0.1/js/brands.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
