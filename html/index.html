<!-- 
UC-JS-05: Save Calculation Record to History
Goal: Store each successful calculation in json-server history collection.
Actor: System (api.js called by app.js)
Trigger: A calculation completes successfully.
Steps Learned:
  - Used fetch() with POST method to send data to the server.
  - Set request headers with "Content-Type": "application/json".
  - Converted JavaScript object to JSON string using JSON.stringify().
  - Sent record object containing type, action, expression, result, and timestamp.
  - Parsed server response using res.json() to get saved object with id.
  - Handled errors using try-catch without interrupting main app flow.
Outcome: Every successful calculation is saved in history without affecting user experience if saving fails.

@author Developer
@version 5.0
-->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    
</head>
<body>

    <div class="p-0">

        <!-- HEADER -->
        
        <div class="header text-center text-white py-4"onclick="changeBg()">
            <h1 id="h1j">Welcome To Quantity Measurement</h1>
        </div>
        <div class="m-5">
            <p class="section-title">CHOOSE TYPE</p>

            <div class="row g-4">

                <div class="col-md-3">
                    <div class="type-card active text-center">
                        <div class="icon"><i class="fa-solid fa-ruler" style="color: rgb(28, 149, 72);"></i></div>
                        <p>Length</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <div class="icon"><i class="fa-solid fa-weight-scale" style="color: rgb(28, 149, 72);"></i></i></div>

                        <p>Weight</p>
                        
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <div class="icon"> <i class="fa-solid fa-temperature-arrow-down" style="color: rgb(28, 149, 72);"></i></div>
                        <p>Temperature</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center">
                        <div class="icon"><i class="fa-solid fa-bottle-water" style="color: rgb(28, 149, 72);"></i></div>
                        <p>Volume</p>
                    </div>
                </div>

                

            </div>

            <p class="section-title mt-5">CHOOSE ACTION</p>

            <div class="row g-3">

                <div class="col-md-4">
                    <button class="btn action-btn active w-100">Comparison</button>
                </div>

                <div class="col-md-4">
                    <button class="btn action-btn w-100">Conversion</button>
                </div>

                <div class="col-md-4">
                    <button class="btn action-btn w-100">Arithmetic</button>
                </div>

            </div>


            <!-- INPUT SECTION -->

            <div class="mb-4 row mt-5 g-4">

                <!-- FROM -->

                <div class="col-md-6">
                    <label class="form-label fw-bold">FROM</label>

                    <div class="input-box">
                        <h1>1</h1>

                        <select class="form-select">
                            <option>Kilometer</option>
                            <option>Meter</option>
                            <option>Centimeter</option>
                        </select>
                    </div>
                </div>


                <!-- TO -->

                <div class="col-md-6">
                    <label class="form-label fw-bold">TO</label>

                    <div class="input-box">
                        <h1>1000</h1>

                        <select class="form-select">
                            <option>Meters</option>
                            <option>Kilometers</option>
                            <option>Centimeters</option>
                        </select>
                    </div>
                </div>

            </div>

        </div>

    </div>
    <script src="https://example.com/fontawesome/v7.0.1/js/fontawesome.js" data-auto-replace-svg="nest"></script>
    <script src="https://example.com/fontawesome/v7.0.1/js/solid.js"></script>
    <script src="https://example.com/fontawesome/v7.0.1/js/brands.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>

</body>
</html>
