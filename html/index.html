<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="p-0">
        <!-- HEADER -->
        <div class="header text-center text-white py-4">
            <h1>Welcome to Quantity Measurement</h1>
        </div>
        <div class="m-5">

            <!-- ================= TYPE ================= -->
            <p class="section-title">CHOOSE TYPE</p>

            <div class="row g-4" id="type-selector">

                <div class="col-md-3">
                        <div class="type-card active text-center" data-type="Length">
                                                <div class="icon">
                            <img alt="length"
                                src="https://media.gettyimages.com/id/2159801874/vector/3d-pencil-with-triangle-ruler-vector.jpg?s=612x612&w=0&k=20&c=Ne38ALgaqw7Dcrc5zSsx6DcFLET-3u_tqWoXriSBNng="
                                height="70px" width="70px">
                        </div>
                        <p>Length</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center" data-type="Weight">
                        <img alt="length"
                                src="https://media.gettyimages.com/id/625739874/photo/heavy-weight-exercise.jpg?s=612x612&w=0&k=20&c=B1uzJW1DBei2Rx5hnt139tt9dt3L7TbKrpgwbMR-LrI="
                                height="70px" width="90px">
                        
                        <p>Weight</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center" data-type="Temperature">
                        <img alt="length"
                                src="https://media.gettyimages.com/id/2218135867/photo/thermometer-showing-tropical-heat-and-sky-with-hot-sun-rays-in-celsius-and-fahrenheit.jpg?s=612x612&w=0&k=20&c=Gaq5RahelR1LL8FW86wyIK_EbJmXRKOHInnkkQ38bOo="
                                height="70px" width="90px">
                        <p>Temperature</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="type-card text-center" data-type="Volume">
                        <img alt="length"
                                src="https://media.gettyimages.com/id/692027135/photo/meniscus-curved-surface-of-water-in-graduated-cylinder-liquid-volume-measured-by-reading-the.jpg?s=612x612&w=0&k=20&c=QcYF1gQIkJl6ht8L4RPeykKBQInap9BRp3e1woUmL3E="
                                height="70px" width="90px">
                        <p>Volume</p>
                    </div>
                </div>

            </div>


            <!-- ================= ACTION ================= -->
            <p class="section-title mt-5">CHOOSE ACTION</p>

            <div class="row g-3" id="action-selector">

                <div class="col-md-4">
                    <button type="button" class="btn action-btn active w-100" data-action="Comparison">
                        Comparison
                    </button>
                </div>

                <div class="col-md-4">
                    <button type="button" class="btn action-btn w-100" data-action="Conversion">
                        Conversion
                    </button>
                </div>

                <div class="col-md-4">
                    <button type="button" class="btn action-btn w-100" data-action="Arithmetic">Arithmetic</button>
     
                </div>

            </div>


            <!-- ================= INPUT SECTION ================= -->
            <div class="mb-4 row mt-5 g-4">

                <!-- FROM -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">FROM</label>

                    <div class="input-box">
                        <input type="number" id="from-value" class="form-control mb-3" placeholder="Enter value" value="">

                        <select id="from-unit" class="form-select"></select>
                    </div>
                </div>

                <!-- TO -->
                <div class="col-md-6">
                    <label class="form-label fw-bold">TO</label>

                    <div class="input-box">
                        <input type="number" id="to-value" class="form-control mb-3" placeholder="Enter value" value="">

                        <select id="to-unit" class="form-select"></select>
                    </div>
                </div>

            </div>


            <!-- ================= OPERATOR (UC-13) ================= -->
            <div class="mt-4" id="operator-selector" style="display: none;">
                <div class="d-flex justify-content-center gap-3">

                    <button type="button" class="btn btn-secondary operator-btn" data-op="+">+</button>
                    
                    <button type="button" class="btn btn-secondary operator-btn" data-op="-">-</button>
                    <button type="button" class="btn btn-secondary operator-btn" data-op="*">*</button>
                    <button type="button" class="btn btn-secondary operator-btn" data-op="/">/</button>

                </div>
            </div>


            <!-- ================= RESULT (UC-12) ================= -->
            <div class="mt-5 text-center">
                <p class="section-title">RESULT</p>

                <div class="input-box">
                    <h2>
                        <span id="result-value">—</span>
                        <span id="result-unit"></span>
                    </h2>
                </div>
            </div>


            <!-- ================= HISTORY (UC-14) ================= -->
            <div class="mt-5">
                <p class="section-title">HISTORY</p>

                <ul id="history-list" class="list-group">
                    <li class="list-group-item">No history yet.</li>
                </ul>
            </div>

        </div>
    </div>


    <!-- ================= JS FILES ================= -->
    <script src="../js/conversion.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>

</body>
</html>
